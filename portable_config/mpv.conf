# ---------- OSC / 窗口 ----------
osc=no                                # 使用默认皮肤
save-position-on-quit=no     # 记住上次播放位置，下次打开继续看
keep-open=yes                    # 播完停在末帧
cursor-autohide=1000
window-maximized=no       # 运行 MPV 自动窗口最大化 yes代表最大化，no代表正常
#no-border                         # 默认为系统原生窗口界面，启用此项使用无边框界面（去除 Windows 的窗口装饰）       
#ontop                                # 窗口置顶  


# ---------- 切换文件速度优化 ----------
# 关掉初始化时同步等待 GPU/音频，让 loadfile 返回更快
prefetch-playlist=yes                 # 提前解析下一集元数据
force-window=immediate                # 窗口不重建，切文件时不闪


# ===================================================================
# 一、硬件解码 · 30/40/50 系全兼容
# ===================================================================
# 用裸 nvdec（不加 -copy）：切换文件秒开；-copy 会拖慢 300-800ms
# N卡使用专用解码器 nvdec，避免 d3d11va 在部分录屏/非规整文件上卡死
hwdec=nvdec
vo=gpu-next                           # gpu-next = 下一代渲染器，色彩链路更准
# gpu-api 让 mpv 自己选（Windows 默认就是 d3d11），少一次显式重建


# ===================================================================
# 二、渲染 · 全部走直通，不做任何"美化"
# ===================================================================
# 缩放全用 bilinear 双线性 —— 不锐化、不抖动加成、不做假细节
scale=bilinear
cscale=bilinear
dscale=bilinear
dither=no                             # 关抖动，直出原始位深
correct-downscaling=no                # 缩小时不做额外线性光处理
linear-downscaling=no
sigmoid-upscaling=no                  # 关掉 sigmoid 曲线，纯线性
deband=no                             # 关色带修复（那是"改"画面）


# ===================================================================
# 三、色彩链路 · HDR/SDR 都直出
# ===================================================================
target-colorspace-hint=yes            # 告诉 GPU 目标显示色域，交给系统
tone-mapping=clip                     # HDR→SDR 不做色调映射，超亮部分裁掉
gamut-mapping-mode=clip               # 色域超出直接钳制，不做柔和过渡
hdr-compute-peak=no                   # 关掉自适应峰值检测


# ===================================================================
# 四、时间戳/同步 
# ===================================================================
video-sync=audio                      # 以音频为主时钟，不重采样到显示器
interpolation=no                      # 关插帧，保留原始每一帧
framedrop=no                          # 不丢帧（审片场景优先完整性）


# ===================================================================
# 五、缓存 · 本地文件保持轻量，切换才快
# ===================================================================
# 本地播放不显式开 cache，避免 loadfile 时预填缓冲导致慢加载
# demuxer 缓存也保持 mpv 默认（约 150MB 上限但按需增长，不是一次性占满）
cache=auto                            # 本地=不缓存，网络流才启用
demuxer-max-bytes=64MiB               # 从 150 降到 64，切换更快
demuxer-max-back-bytes=32MiB
demuxer-readahead-secs=2              # 只预读 2 秒，快速首帧


# ===================================================================
# 六、字幕样式
# ===================================================================
sub-font=Microsoft YaHei
sub-font-size=45
sub-color=#fbc420
sub-border-color=#000000
sub-border-size=2.5


# ===================================================================
# 七、截图 · 审片出图
# ===================================================================
screenshot-format=png
screenshot-template=%F_%p_%03n        # 文件名_时间戳_序号
#screenshot-directory=~~/desktop/


# ===================================================================
# 八、OSD 屏幕叠加提示设置
# ===================================================================
osd-duration=2000
osd-font-size=32

# ===================================================================
# 九、Launcher IPC（勿动）
# ===================================================================
# 固定 IPC 服务器（供 player-launcher.exe 通信实现无缝切片/切换视频）
# 不管从哪个入口启动 mpv，都会开这个管道，播放列表 launcher 通过它下发 loadfile
input-ipc-server=\\.\pipe\mpvnet_launcher

# ===================================================================
# 十、缩略图预览（配合 scripts/thumbfast）
# ===================================================================
# thumbfast 自身通过 script-opts 配置，这里不用加参数；仅记录以防查找


# ===================================================================
# 冷启动加速 · 零副作用
# ===================================================================
# 关掉状态存档扫描 —— 每次启动 mpv 都会去扫 %APPDATA%/mpv/watch_later/
# 上千条续播记录时，光这步就要几百毫秒
resume-playback=no

# 立刻显示窗口（黑屏也算），不等首帧就绪
# 视觉上：双击 → 窗口马上出来 → 半秒后画面填进去
# 感受上比"憋着不出窗口，一下弹出满帧"快很多
force-window=immediate

# 让 mpv 在文件加载前就把 GPU 上下文准备好
# 默认是 lazy 初始化，会拖慢首个视频
gpu-context=d3d11
