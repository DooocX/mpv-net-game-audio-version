# ===================================================================
# input.conf - mpv.net 审片工作流按键映射
# 命名规范：能不改内置默认就不改；只补齐审片流常缺的键
# 与外部脚本的绑定：
#   uosc                  → 右键菜单 / OSC（自己注册）
#   trim.lua              → h（起）/ k（止）/ e（导出）
#   copy-timestamp.lua    → Alt+X（格式化） / Alt+Shift+X（原始秒）
#   frame-seek.lua        → Ctrl+T
#   playlistmanager.lua   → TAB
# ===================================================================

# ---------- 窗口 & 菜单 ----------
_           cycle ontop                                       # 切换置顶
_           script-message-to mpvnet edit-conf-file input.conf # 编辑本文件
MBTN_Right  script-message-to mpvnet show-menu                # 右键菜单

# ---------- 播放列表 ----------
TAB         script-message playlistmanager show playlist toggle

# ===================================================================
# 一、逐帧 / 精细快进快退 —— 审片核心
# ===================================================================
# mpv 默认已有：. 下一帧 / , 上一帧
# 补：小步跳 1s / 中步 5s / 大步 30s（Shift 组合）
LEFT        seek -1  exact                                    # ← 后退 1s（精确）
RIGHT       seek  1  exact                                    # → 前进 1s（精确）
Shift+LEFT  seek -5  exact                                    # ← 后退 5s
Shift+RIGHT seek  5  exact                                    # → 前进 5s
Ctrl+LEFT   seek -30 exact                                    # 后退 30s
Ctrl+RIGHT  seek  30 exact                                    # 前进 30s
UP          seek  10 exact                                    # ↑ 前进 10s
DOWN        seek -10 exact                                    # ↓ 后退 10s

# ===================================================================
# 二、播放速度 —— 音频/视频审核常用
# ===================================================================
[           multiply speed 1/1.1                              # 减速 10%
]           multiply speed 1.1                                # 加速 10%
{           multiply speed 0.5                                # 半速
}           multiply speed 2.0                                # 双速
BS          set speed 1.0                                     # 恢复原速（Backspace）

# ===================================================================
# 三、AB 循环 —— 审同一段素材反复听
# ===================================================================
l           ab-loop                                           # 打点 A / 打点 B / 清除
L           cycle-values ab-loop-count "inf" "0"              # 无限循环 / 关闭

# ===================================================================
# 四、音量 & 静音
# ===================================================================
9           add volume -2
0           add volume  2
m           cycle mute

# ===================================================================
# 五、字幕 & 音轨切换（多语言素材常用）
# ===================================================================
j           cycle sub                                         # 下一条字幕
J           cycle sub down                                    # 上一条字幕
v           cycle sub-visibility                              # 显示/隐藏字幕
#           cycle audio                                       # 下一条音轨

# ===================================================================
# 六、截图 —— 审核出图
# ===================================================================
s           screenshot                                        # 带字幕 + OSD
S           screenshot video                                  # 纯画面（无字幕）
Ctrl+s      screenshot window                                 # 带窗口装饰

# ===================================================================
# 七、显示信息 —— 审核报错查参数
# ===================================================================
i           script-binding stats/display-stats-toggle         # 持久统计面板
I           script-binding stats/display-stats                # 单次统计
o           show-progress                                     # 进度条

# ===================================================================
# 八、Launcher / 切片辅助（不与 trim.lua 冲突）
# ===================================================================
# trim.lua 用了 h/k/e，故此处不再绑定这三个键
Ctrl+L      script-message-to player_launcher snap            # 保留位（launcher 自己收到 Ctrl+L 才响应）

# ===================================================================
# 九、其它常用
# ===================================================================
SPACE       cycle pause
ENTER       cycle pause
f           cycle fullscreen
ESC         set fullscreen no
q           quit
Q           quit-watch-later
